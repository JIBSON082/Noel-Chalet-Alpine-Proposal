<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noël Chalet Alpine: Website Development Proposal</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #0F0D1A;
      --ink-mid:    #2D2440;
      --purple:     #5B1FA8;
      --purple-mid: #7C3CC4;
      --purple-lite:#EDE4F9;
      --purple-tint:#F7F2FD;
      --gold:       #C89B3C;
      --gold-lite:  #F5ECD6;
      --cream:      #FDFBF8;
      --line:       #E4DDF0;
      --muted:      #7A6D8A;
      --white:      #FFFFFF;
      --radius:     4px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    /* ===== SELECTION SCREEN ===== */
    #selection-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--ink);
      position: relative;
      overflow: hidden;
    }

    .selection-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 60%, rgba(91,31,168,0.35) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 20%, rgba(200,155,60,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .selection-inner {
      position: relative;
      z-index: 2;
      max-width: 1100px;
      margin: 0 auto;
      padding: 64px 32px 80px;
      width: 100%;
    }

    .brand-lockup {
      text-align: center;
      margin-bottom: 64px;
    }

    .brand-eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(38px, 6vw, 64px);
      font-weight: 300;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .brand-name em {
      font-style: italic;
      color: var(--gold);
    }

    .brand-sub {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 300;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.04em;
      margin-top: 12px;
    }

    .divider-gold {
      width: 48px;
      height: 1px;
      background: var(--gold);
      margin: 20px auto;
      opacity: 0.6;
    }

    .selection-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      text-align: center;
      margin-bottom: 36px;
    }

    .proposal-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .proposal-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 40px 36px 44px;
      cursor: pointer;
      transition: border-color 0.25s, background 0.25s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .proposal-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--purple-mid), var(--gold));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .proposal-card:hover {
      border-color: rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.07);
      transform: translateY(-3px);
    }

    .proposal-card:hover::before { opacity: 1; }

    .card-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 500;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .card-desc {
      font-size: 13px;
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .card-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 4px;
    }

    .card-price-usd {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      font-weight: 300;
      margin-bottom: 24px;
    }

    .card-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(200,155,60,0.4);
      padding: 10px 20px;
      border-radius: var(--radius);
      transition: background 0.2s, color 0.2s;
    }

    .proposal-card:hover .card-cta {
      background: var(--gold);
      color: var(--ink);
    }

    .card-tag {
      position: absolute;
      top: 20px; right: 20px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .card-tag.standard { background: rgba(91,31,168,0.25); color: #C4A3F0; }
    .card-tag.premium  { background: rgba(200,155,60,0.2); color: var(--gold); }

    .selection-footer {
      position: relative; z-index: 2;
      text-align: center;
      padding: 0 32px 40px;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      font-weight: 300;
    }

    /* ===== PROPOSAL VIEWS ===== */
    .proposal-view {
      display: none;
      min-height: 100vh;
    }

    .proposal-view.active { display: block; }

    /* NAV */
    .prop-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15,13,26,0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-weight: 500;
      color: var(--white);
      letter-spacing: 0.02em;
    }

    .nav-brand span { color: var(--gold); font-style: italic; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-tag {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .nav-tag.p1 { background: rgba(91,31,168,0.3); color: #C4A3F0; border: 1px solid rgba(91,31,168,0.4); }
    .nav-tag.p2 { background: rgba(200,155,60,0.2); color: var(--gold); border: 1px solid rgba(200,155,60,0.35); }

    .back-btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      background: none;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 7px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .back-btn:hover { color: var(--white); border-color: rgba(255,255,255,0.35); }

    /* HERO */
    .prop-hero {
      background: var(--ink);
      padding: 80px 40px 72px;
      position: relative;
      overflow: hidden;
    }

    .prop-hero-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 50% 80% at 80% 50%, rgba(91,31,168,0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    .prop-hero-inner {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .hero-eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 300;
      color: var(--white);
      line-height: 1.12;
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }

    .hero-title em { font-style: italic; color: var(--gold); }

    .hero-desc {
      font-size: 14px;
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      line-height: 1.8;
      max-width: 560px;
      margin-bottom: 36px;
    }

    .hero-meta {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }

    .meta-item { display: flex; flex-direction: column; gap: 3px; }

    .meta-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    .meta-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
    }

    /* CONTENT */
    .prop-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 64px 40px 100px;
    }

    /* SECTION */
    .section {
      margin-bottom: 56px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .section-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      color: var(--gold);
      opacity: 0.7;
      min-width: 24px;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .body-text {
      font-size: 14px;
      font-weight: 400;
      color: #3D3450;
      line-height: 1.8;
      margin-bottom: 14px;
    }

    /* PAGES GRID */
    .pages-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .page-item {
      background: var(--purple-tint);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 18px 20px;
    }

    .page-item-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 7px;
    }

    .page-item-desc {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.65;
    }

    /* TECH STACK */
    .tech-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .tech-chip {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 14px 16px;
      text-align: center;
    }

    .tech-chip-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-mid);
      margin-bottom: 3px;
    }

    .tech-chip-role {
      font-size: 11px;
      color: var(--muted);
    }

    /* PAYMENT FLOW */
    .flow-steps {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .flow-step {
      display: flex;
      gap: 20px;
      position: relative;
    }

    .flow-step:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 16px;
      top: 40px;
      bottom: 0;
      width: 1px;
      background: var(--line);
    }

    .flow-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--purple-lite);
      border: 2px solid var(--purple);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      z-index: 1;
    }

    .flow-dot-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--purple);
    }

    .flow-body {
      padding-bottom: 28px;
      flex: 1;
    }

    .flow-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 5px;
    }

    .flow-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    /* FEATURES LIST */
    .features-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .feature-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 13px 15px;
    }

    .feature-check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--purple-lite);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .feature-check svg { width: 10px; height: 10px; }

    .feature-text {
      font-size: 12.5px;
      color: var(--ink-mid);
      line-height: 1.5;
    }

    /* DB TABLE */
    .db-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .db-table thead tr {
      background: var(--ink);
    }

    .db-table thead th {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      padding: 12px 16px;
      text-align: left;
    }

    .db-table tbody tr:nth-child(odd)  { background: var(--purple-tint); }
    .db-table tbody tr:nth-child(even) { background: var(--white); }

    .db-table tbody td {
      padding: 11px 16px;
      color: var(--ink-mid);
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    .db-table tbody td:first-child {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 12px;
      color: var(--purple);
    }

    .db-table tbody td:last-child {
      font-family: 'Inter', monospace;
      font-size: 11.5px;
      color: var(--muted);
    }

    /* TIMELINE */
    .timeline-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .timeline-item {
      background: var(--white);
      border: 1px solid var(--line);
      border-top: 3px solid var(--purple);
      border-radius: 6px;
      padding: 20px 18px;
    }

    .timeline-week {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 8px;
    }

    .timeline-desc {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* PRICE BOX */
    .price-block {
      background: var(--ink);
      border-radius: 10px;
      padding: 48px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .price-block-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 80% at 50% 100%, rgba(91,31,168,0.4) 0%, transparent 70%);
      pointer-events: none;
    }

    .price-block-inner { position: relative; z-index: 2; }

    .price-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 10px;
    }

    .price-naira {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(48px, 8vw, 72px);
      font-weight: 600;
      color: var(--white);
      line-height: 1;
      margin-bottom: 6px;
    }

    .price-usd {
      font-size: 14px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 16px;
    }

    .price-includes {
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 0.04em;
      margin-bottom: 36px;
    }

    .payment-plan {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      max-width: 480px;
      margin: 0 auto;
    }

    .plan-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 20px;
    }

    .plan-card-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 6px;
    }

    .plan-card-amount {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 4px;
    }

    .plan-card-when {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
    }

    /* TERMS */
    .terms-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .term-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 14px 16px;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    .term-bullet {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--purple);
      margin-top: 7px;
      flex-shrink: 0;
    }

    .term-text {
      font-size: 13px;
      color: var(--ink-mid);
      line-height: 1.7;
    }

    /* CONTACT */
    .contact-block {
      background: var(--purple-tint);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 36px 40px;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .contact-item { display: flex; flex-direction: column; gap: 4px; }

    .contact-item-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .contact-item-value {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
    }

    /* FOOTER */
    .prop-footer {
      background: var(--ink);
      text-align: center;
      padding: 28px 40px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.04em;
    }

    /* UTIL */
    .text-gold  { color: var(--gold); }
    .text-purple { color: var(--purple); }
    .fw-600 { font-weight: 600; }

    /* RESPONSIVE */
    @media (max-width: 720px) {
      .proposal-cards { grid-template-columns: 1fr; }
      .pages-grid     { grid-template-columns: 1fr; }
      .tech-grid      { grid-template-columns: repeat(2, 1fr); }
      .features-list  { grid-template-columns: 1fr; }
      .timeline-grid  { grid-template-columns: 1fr 1fr; }
      .payment-plan   { grid-template-columns: 1fr; max-width: 280px; }
      .contact-grid   { grid-template-columns: 1fr; }
      .prop-hero      { padding: 48px 24px; }
      .prop-content   { padding: 40px 24px 80px; }
      .prop-nav       { padding: 0 20px; }
      .hero-meta      { gap: 20px; }
    }

    @media (max-width: 480px) {
      .timeline-grid { grid-template-columns: 1fr; }
      .selection-inner { padding: 40px 20px 60px; }
    }
  </style>
</head>
<body>

<!-- ===================================================== -->
<!-- SELECTION SCREEN                                       -->
<!-- =========================================
